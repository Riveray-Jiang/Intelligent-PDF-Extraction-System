services:
  paddle-runner:
    build:
      context: ..
      dockerfile: docker/Dockerfile.paddle
    image: pdf-agent/paddle-runner:0.1.0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    working_dir: /workspace
    volumes:
      - ../:/workspace
    command: ["sleep", "infinity"]

  mineru-runner:
    build:
      context: ..
      dockerfile: docker/Dockerfile.mineru
    image: pdf-agent/mineru-runner:0.1.0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    working_dir: /workspace
    volumes:
      - ../:/workspace
    command: ["sleep", "infinity"]